<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pine Script Dashboard — Day-Trading</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d;
      --text: #c9d1d9; --text-dim: #8b949e; --accent: #2962ff;
      --green: #26a69a; --red: #ef5350; --amber: #ff9800;
      --high-bg: #2d1117; --high-border: #6e2030;
      --med-bg: #2d2000; --med-border: #7d5a00;
      --low-bg: #1a2035; --low-border: #2a4080;
      --pass-bg: #0d2b1f; --pass-border: #1a6644;
      --cond-bg: #2d1f00; --cond-border: #7d5000;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Header ── */
    .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
    .hdr-title { font-size: 18px; font-weight: 700; }
    .hdr-sub { color: var(--text-dim); font-size: 12px; }
    .hdr-date { margin-left: auto; color: var(--text-dim); font-size: 12px; }

    /* ── Tabs ── */
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; overflow-x: auto; }
    .tab { padding: 11px 18px; cursor: pointer; color: var(--text-dim); font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: color 0.15s, border-color 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Layout ── */
    .content { max-width: 1060px; margin: 0 auto; padding: 24px 20px; }
    .pane { display: none; }
    .pane.active { display: block; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; margin-bottom: 14px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text); }

    /* ── Overview grid ── */
    .ov-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; }
    .stat-val { font-size: 26px; font-weight: 700; line-height: 1.1; }
    .stat-lbl { color: var(--text-dim); font-size: 11px; margin-top: 3px; }
    .c-green { color: var(--green); } .c-amber { color: var(--amber); } .c-red { color: var(--red); } .c-accent { color: var(--accent); }

    /* ── Top-3 ── */
    .top3-row { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .top3-row:last-child { border: none; }
    .top3-num { background: var(--accent); color: #fff; min-width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .top3-txt { font-size: 13px; }

    /* ── Notice ── */
    .notice { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text-dim); font-size: 13px; font-style: italic; }

    /* ── File pane header ── */
    .file-hdr { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; }
    .score-wrap { position: relative; width: 76px; height: 76px; flex-shrink: 0; }
    .score-svg { width: 76px; height: 76px; transform: rotate(-90deg); }
    .score-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
    .score-fg { fill: none; stroke-width: 8; stroke-linecap: round; }
    .score-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-n { font-size: 19px; font-weight: 700; line-height: 1; }
    .score-d { font-size: 10px; color: var(--text-dim); }
    .file-meta { flex: 1; min-width: 200px; }
    .file-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .file-type { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
    .file-desc { font-size: 13px; color: var(--text); line-height: 1.55; }

    /* ── Badges ── */
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: default; position: relative; }
    .badge.pass   { background: var(--pass-bg); border: 1px solid var(--pass-border); color: #4caf50; }
    .badge.conditional { background: var(--cond-bg); border: 1px solid var(--cond-border); color: var(--amber); }
    .badge.fail   { background: var(--high-bg); border: 1px solid var(--high-border); color: var(--red); }
    .badge::after { content: attr(data-tip); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: #1c2128; border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 400; white-space: normal; width: 280px; line-height: 1.45; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
    .badge:hover::after { opacity: 1; }

    /* ── Severity accordion ── */
    .sev-block { margin-bottom: 10px; }
    .sev-hdr { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 9px 12px; border-radius: 6px; user-select: none; transition: background 0.12s; }
    .sev-hdr:hover { background: var(--surface2); }
    .chip { padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .chip-h { background: var(--high-bg); border: 1px solid var(--high-border); color: #f48fa0; }
    .chip-m { background: var(--med-bg); border: 1px solid var(--med-border); color: #ffca28; }
    .chip-l { background: var(--low-bg); border: 1px solid var(--low-border); color: #90caf9; }
    .sev-count { color: var(--text-dim); font-size: 12px; }
    .chevron { color: var(--text-dim); font-size: 11px; margin-left: auto; display: inline-block; transition: transform 0.2s; }
    .chevron.open { transform: rotate(90deg); }
    .sev-body { padding: 2px 0 4px 0; }

    /* ── Issue cards ── */
    .issue { background: var(--surface2); border-radius: 6px; margin-bottom: 7px; border-left: 3px solid var(--border); }
    .issue.h { border-left-color: var(--red); }
    .issue.m { border-left-color: var(--amber); }
    .issue.l { border-left-color: var(--accent); }
    .issue.resolved { opacity: 0.4; }
    .issue-hdr { display: flex; align-items: center; gap: 10px; padding: 11px 13px; cursor: pointer; }
    .issue-cb { width: 15px; height: 15px; flex-shrink: 0; accent-color: var(--green); cursor: pointer; }
    .issue-title { flex: 1; font-size: 13px; font-weight: 500; }
    .issue-toggle { color: var(--text-dim); font-size: 11px; flex-shrink: 0; min-width: 40px; text-align: right; }
    .issue-body { display: none; padding: 0 13px 13px 38px; }
    .issue-body.open { display: block; }
    .issue-expl { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
    .issue-loc { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
    .issue-loc strong { color: var(--text-dim); }
    .fix-wrap { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .fix-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 11px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .fix-lbl { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .copy-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 9px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.12s; }
    .copy-btn:hover { background: var(--surface2); color: var(--text); }
    .copy-btn.ok { border-color: var(--green); color: var(--green); }
    .fix-code { padding: 11px 13px; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 12px; line-height: 1.65; color: #e6edf3; white-space: pre-wrap; overflow-x: auto; }
    .note { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; padding: 7px 10px; margin-top: 9px; resize: vertical; font-family: inherit; min-height: 36px; }
    .note:focus { outline: none; border-color: var(--accent); }

    /* ── Improvements ── */
    .imp-item { padding: 11px 0; border-bottom: 1px solid var(--border); }
    .imp-item:last-child { border: none; }
    .imp-title { font-size: 13px; font-weight: 600; color: var(--amber); margin-bottom: 3px; }
    .imp-desc { font-size: 13px; color: var(--text); line-height: 1.55; }

    /* ── Error / loading ── */
    .err { background: var(--high-bg); border: 1px solid var(--high-border); border-radius: 8px; padding: 24px; margin: 48px auto; max-width: 580px; text-align: center; }
    .err h2 { color: var(--red); margin-bottom: 10px; }
    .err p { color: var(--text-dim); font-size: 13px; line-height: 1.7; }
    .err code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; font-family: monospace; color: var(--text); }
    .loading { text-align: center; padding: 70px; color: var(--text-dim); font-size: 15px; }

    @media (max-width: 580px) {
      .content { padding: 14px 12px; }
      .ov-grid { grid-template-columns: repeat(2, 1fr); }
      .file-hdr { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">Pine Script Dashboard</div>
    <div class="hdr-sub">McRugPull / Day-Trading</div>
  </div>
  <div class="hdr-date" id="hdr-date"></div>
</div>

<div class="tabs" id="tab-bar"></div>
<div class="content" id="app"><div class="loading">Loading…</div></div>

<script>
/* ── Storage helpers ── */
const S = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, String(v)); } catch {} }
};

/* ── Escape HTML ── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Score colour ── */
function scoreCol(n) { return n >= 85 ? '#26a69a' : n >= 70 ? '#ff9800' : '#ef5350'; }

/* ── Score circle SVG ── */
function scoreCircle(n) {
  const r = 30, cx = 38, cy = 38, circ = 2 * Math.PI * r;
  const offset = circ - (n / 100) * circ;
  const col = scoreCol(n);
  return `<div class="score-wrap">
    <svg class="score-svg" viewBox="0 0 76 76">
      <circle class="score-bg" cx="${cx}" cy="${cy}" r="${r}"/>
      <circle class="score-fg" cx="${cx}" cy="${cy}" r="${r}" stroke="${col}"
        stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <div class="score-overlay">
      <span class="score-n" style="color:${col}">${n}</span>
      <span class="score-d">/100</span>
    </div>
  </div>`;
}

/* ── Badges ── */
function renderBadges(badges) {
  return '<div class="badges">' + badges.map(b => {
    const cls = b.status === 'pass' ? 'pass' : b.status === 'conditional' ? 'conditional' : 'fail';
    const icon = b.status === 'pass' ? '✓' : b.status === 'conditional' ? '⚠' : '✗';
    return `<span class="badge ${cls}" data-tip="${esc(b.note || '')}">${icon} ${esc(b.label)}</span>`;
  }).join('') + '</div>';
}

/* ── Copy button ── */
function doCopy(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1800);
  });
}
window.doCopy = doCopy;

/* ── Toggle issue body ── */
function toggleIssue(fk, id) {
  const body = document.getElementById('ib-' + id);
  const tog  = document.getElementById('it-' + id);
  const open = body.classList.toggle('open');
  tog.textContent = open ? '▲ less' : '▼ more';
  S.set('io-' + fk + '-' + id, open ? '1' : '0');
}
window.toggleIssue = toggleIssue;

/* ── Toggle resolved ── */
function toggleResolved(fk, id, cb) {
  document.getElementById('ic-' + id).classList.toggle('resolved', cb.checked);
  S.set('ir-' + fk + '-' + id, cb.checked ? '1' : '0');
}
window.toggleResolved = toggleResolved;

/* ── Toggle severity section ── */
function toggleSev(fk, sk) {
  const body = document.getElementById('sb-' + fk + '-' + sk);
  const chev = document.getElementById('sc-' + fk + '-' + sk);
  const open = body.style.display === 'none';
  body.style.display = open ? '' : 'none';
  chev.classList.toggle('open', open);
  S.set('so-' + fk + '-' + sk, open ? '1' : '0');
}
window.toggleSev = toggleSev;

/* ── Render one issue ── */
function renderIssue(issue, fk, sev) {
  const resolved = S.get('ir-' + fk + '-' + issue.id) === '1';
  const bodyOpen = S.get('io-' + fk + '-' + issue.id) === '1';
  const note     = S.get('no-' + fk + '-' + issue.id) || '';
  const sevCls   = sev === 'high' ? 'h' : sev === 'medium' ? 'm' : 'l';
  const fixId    = 'fix-' + issue.id;

  return `<div class="issue ${sevCls} ${resolved ? 'resolved' : ''}" id="ic-${issue.id}">
    <div class="issue-hdr" onclick="toggleIssue('${fk}','${issue.id}')">
      <input type="checkbox" class="issue-cb" ${resolved ? 'checked' : ''}
        onclick="event.stopPropagation();toggleResolved('${fk}','${issue.id}',this)"
        title="Mark resolved">
      <span class="issue-title">${esc(issue.title)}</span>
      <span class="issue-toggle" id="it-${issue.id}">${bodyOpen ? '▲ less' : '▼ more'}</span>
    </div>
    <div class="issue-body ${bodyOpen ? 'open' : ''}" id="ib-${issue.id}">
      <p class="issue-expl">${esc(issue.explanation)}</p>
      <p class="issue-loc"><strong>Location:</strong> ${esc(issue.location)}</p>
      ${issue.fix ? `<div class="fix-wrap">
        <div class="fix-bar">
          <span class="fix-lbl">Ready-to-paste fix</span>
          <button class="copy-btn" onclick="doCopy('${fixId}',this)">Copy</button>
        </div>
        <pre class="fix-code" id="${fixId}">${esc(issue.fix)}</pre>
      </div>` : ''}
      <textarea class="note" placeholder="Your notes (saved in browser)…"
        oninput="S.set('no-${fk}-${issue.id}',this.value)">${esc(note)}</textarea>
    </div>
  </div>`;
}

/* ── Render severity section ── */
function renderSev(label, sk, issues, fk) {
  if (!issues || issues.length === 0) return '';
  const open = S.get('so-' + fk + '-' + sk) !== '0'; // default open
  const chipCls = sk === 'high' ? 'chip-h' : sk === 'medium' ? 'chip-m' : 'chip-l';
  return `<div class="sev-block">
    <div class="sev-hdr" onclick="toggleSev('${fk}','${sk}')">
      <span class="chip ${chipCls}">${label}</span>
      <span class="sev-count">${issues.length} issue${issues.length !== 1 ? 's' : ''}</span>
      <span class="chevron ${open ? 'open' : ''}" id="sc-${fk}-${sk}">&#9654;</span>
    </div>
    <div class="sev-body" id="sb-${fk}-${sk}" style="${open ? '' : 'display:none'}">
      ${issues.map(i => renderIssue(i, fk, sk)).join('')}
    </div>
  </div>`;
}

/* ── Render a file pane ── */
function renderFile(file, fk) {
  const iss = file.issues || {};
  const total = (iss.high||[]).length + (iss.medium||[]).length + (iss.low||[]).length;
  const imps  = file.improvements || [];
  return `<div>
    <div class="file-hdr">
      ${scoreCircle(file.overallScore)}
      <div class="file-meta">
        <div class="file-name">${esc(file.displayName)}</div>
        <div class="file-type">${esc(file.type)} &nbsp;·&nbsp; ${esc(file.filename)}</div>
        <div class="file-desc">${esc(file.description)}</div>
      </div>
    </div>
    ${renderBadges(file.badges || [])}
    <div class="card">
      <div class="card-title">Issues <span style="font-size:12px;font-weight:400;color:var(--text-dim)">(${total} found — check each off as you fix it)</span></div>
      ${renderSev('High', 'high', iss.high, fk)}
      ${renderSev('Medium', 'medium', iss.medium, fk)}
      ${renderSev('Low', 'low', iss.low, fk)}
      ${total === 0 ? '<p style="color:var(--green)">No issues found.</p>' : ''}
    </div>
    ${imps.length ? `<div class="card">
      <div class="card-title">Improvement Ideas</div>
      ${imps.map(i => `<div class="imp-item">
        <div class="imp-title">${esc(i.title)}</div>
        <div class="imp-desc">${esc(i.description)}</div>
      </div>`).join('')}
    </div>` : ''}
  </div>`;
}

/* ── Render overview pane ── */
function renderOverview(data) {
  const ic  = data.summary.issueCount;
  const avg = Math.round(data.files.reduce((a,f) => a + f.overallScore, 0) / data.files.length);

  const statsHtml = `<div class="ov-grid">
    <div class="stat"><div class="stat-val" style="color:${scoreCol(avg)}">${avg}<span style="font-size:14px;color:var(--text-dim)">/100</span></div><div class="stat-lbl">Avg Health Score</div></div>
    <div class="stat"><div class="stat-val c-red">${ic.high}</div><div class="stat-lbl">High Severity</div></div>
    <div class="stat"><div class="stat-val c-amber">${ic.medium}</div><div class="stat-lbl">Medium Severity</div></div>
    <div class="stat"><div class="stat-val c-accent">${ic.low}</div><div class="stat-lbl">Low Severity</div></div>
    ${data.files.map(f => {
      const tot = (f.issues.high||[]).length + (f.issues.medium||[]).length + (f.issues.low||[]).length;
      const col = scoreCol(f.overallScore);
      return `<div class="stat"><div class="stat-val" style="color:${col}">${f.overallScore}<span style="font-size:14px;color:var(--text-dim)">/100</span></div><div class="stat-lbl">${esc(f.displayName)}</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px">${tot} issue${tot!==1?'s':''}</div></div>`;
    }).join('')}
  </div>`;

  const top3Html = `<div class="card">
    <div class="card-title">Top 3 — Fix These First</div>
    ${(data.summary.top3 || []).map((t,i) => `<div class="top3-row">
      <div class="top3-num">${i+1}</div>
      <div class="top3-txt">${esc(t)}</div>
    </div>`).join('')}
  </div>`;

  const changeHtml = data.isFirstRun
    ? `<div class="card"><div class="card-title">What Changed Since Last Run</div>
        <div class="notice">First run — no baseline to compare against. Future runs will highlight new and resolved issues here.</div>
       </div>`
    : `<div class="card"><div class="card-title">What Changed Since Last Run</div>
        <div class="notice">Previous run: ${esc(data.previousRunDate || 'unknown')}</div>
       </div>`;

  const aboutHtml = `<div class="card" style="color:var(--text-dim);font-size:13px;line-height:1.7">
    <div class="card-title" style="color:var(--text)">About This Dashboard</div>
    <p>This file (<code style="background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--text)">dashboard/dashboard.html</code>) lives in your repo alongside <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--text)">dashboard-data.json</code> and is refreshed automatically by an AI routine that reads your .pine files and writes ready-to-paste fixes.</p>
    <p style="margin-top:8px"><strong style="color:var(--text)">To view it:</strong> Open via GitHub Pages (repo Settings → Pages) or a local server — e.g. <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--text)">python -m http.server</code> inside the <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--text)">dashboard/</code> folder, then open <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--text)">http://localhost:8000</code>. Issue checkboxes and notes are saved in your browser's localStorage.</p>
    <p style="margin-top:8px"><strong style="color:var(--amber)">Reminder:</strong> Cleaner code is not a guarantee of profitable signals. These are static code-quality findings only.</p>
  </div>`;

  return statsHtml + top3Html + changeHtml + aboutHtml;
}

/* ── Tab switching ── */
function switchTab(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  const tb = document.getElementById('tab-' + key);
  const pn = document.getElementById('pane-' + key);
  if (tb) tb.classList.add('active');
  if (pn) pn.classList.add('active');
  S.set('active-tab', key);
}
window.switchTab = switchTab;

/* ── Main render ── */
function render(data) {
  document.getElementById('hdr-date').textContent = 'Run #' + data.runNumber + ' · ' + data.generated;

  const tabDefs = [{ key: 'overview', label: 'Overview' }].concat(
    data.files.map((f, i) => ({ key: 'f' + i, label: f.displayName }))
  );
  const saved = S.get('active-tab') || 'overview';

  document.getElementById('tab-bar').innerHTML = tabDefs.map(t =>
    `<div class="tab ${t.key === saved ? 'active' : ''}" id="tab-${t.key}" onclick="switchTab('${t.key}')">${esc(t.label)}</div>`
  ).join('');

  const panesHtml = tabDefs.map((t, i) => {
    const content = i === 0
      ? renderOverview(data)
      : renderFile(data.files[i - 1], 'f' + (i - 1));
    return `<div class="pane ${t.key === saved ? 'active' : ''}" id="pane-${t.key}">${content}</div>`;
  }).join('');

  document.getElementById('app').innerHTML = panesHtml;
}

/* ── Bootstrap ── */
fetch('./dashboard-data.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById('app').innerHTML = `<div class="err">
      <h2>Could not load dashboard-data.json</h2>
      <p>The dashboard needs to be served over HTTP — it cannot load the JSON when opened directly from the filesystem (<code>file://</code>).</p>
      <p style="margin-top:14px"><strong style="color:var(--text)">Quick options:</strong><br>
      ① Enable GitHub Pages in repo Settings → Pages<br>
      ② VS Code: right-click <code>dashboard.html</code> → <em>Open with Live Server</em><br>
      ③ Terminal (inside <code>dashboard/</code>): <code>python -m http.server 8080</code> → open <code>http://localhost:8080</code></p>
      <p style="margin-top:10px;font-size:12px;color:#555">Error: ${esc(err.message)}</p>
    </div>`;
  });
</script>
</body>
</html>
